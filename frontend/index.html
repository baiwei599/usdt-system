<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>USDT兑换系统 | 正规兑换平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
        }
        header {
            background: rgba(0,0,0,0.3);
            padding: 15px 20px;
            backdrop-filter: blur(10px);
        }
        .headerContet {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 24px; font-weight: bold; color: white; }
        .logo span { background: linear-gradient(135deg, #FFD700, #FFA500); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .headerRight { display: flex; gap: 15px; }
        .headerRight > div {
            color: white; cursor: pointer; padding: 8px 16px;
            background: rgba(255,255,255,0.15); border-radius: 8px;
            transition: all 0.3s;
        }
        .headerRight > div:hover { background: rgba(255,255,255,0.3); }
        .contentBox { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .title1 { text-align: center; font-size: 48px; font-weight: bold; color: white; margin-bottom: 15px; }
        .title2 { text-align: center; color: rgba(255,255,255,0.9); margin-bottom: 40px; font-size: 16px; }
        .title2 span { margin: 0 15px; display: inline-block; }
        .mainBox { background: white; border-radius: 24px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .mainTitle { font-size: 20px; font-weight: bold; padding-bottom: 15px; border-bottom: 2px solid #f0f0f0; margin-bottom: 25px; }
        .exchange { display: flex; gap: 20px; margin-bottom: 25px; flex-wrap: wrap; }
        .inputBox { flex: 2; min-width: 200px; }
        .inputBox label { display: block; margin-bottom: 8px; color: #666; font-size: 14px; }
        .input1 {
            width: 100%; padding: 15px; border: 2px solid #e8e8e8;
            border-radius: 12px; font-size: 18px; transition: all 0.3s;
        }
        .input1:focus { outline: none; border-color: #2a5298; }
        .selectUsdt {
            flex: 1; background: #f5f7fa; border-radius: 12px;
            padding: 15px; text-align: center; min-width: 120px;
        }
        .calculation { background: #f8f9fc; border-radius: 16px; padding: 20px; margin-bottom: 25px; }
        .resultBox { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .result { font-size: 32px; font-weight: bold; color: #2a5298; }
        .section-title { font-size: 14px; color: #666; margin-bottom: 12px; }
        .getMoneyMthod { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .getMoneyMthod > div {
            flex: 1; padding: 12px; text-align: center; background: #f5f7fa;
            border-radius: 10px; cursor: pointer; transition: all 0.3s; min-width: 100px;
        }
        .getMoneyMthod > div.active { background: linear-gradient(135deg, #1e3c72, #2a5298); color: white; }
        .form-group { margin-bottom: 15px; }
        .form-group input {
            width: 100%; padding: 14px; border: 2px solid #e8e8e8;
            border-radius: 10px; font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #2a5298; }
        .RedeemNowBtn {
            background: linear-gradient(135deg, #1e3c72, #2a5298); color: white;
            text-align: center; padding: 16px; border-radius: 12px;
            font-size: 18px; font-weight: bold; cursor: pointer;
            margin-top: 20px; transition: transform 0.2s;
        }
        .RedeemNowBtn:hover { transform: translateY(-2px); }
        .orders-section { margin-top: 40px; background: white; border-radius: 24px; padding: 25px; }
        .orders-title { font-size: 18px; font-weight: bold; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #f0f0f0; }
        .order-list { max-height: 300px; overflow-y: auto; }
        .order-item { display: flex; padding: 12px; border-bottom: 1px solid #f0f0f0; font-size: 14px; flex-wrap: wrap; gap: 8px; }
        .order-item > div { flex: 1; min-width: 100px; }
        .status-0 { color: #f39c12; }
        .status-1 { color: #3498db; }
        .status-2 { color: #27ae60; }
        .status-3 { color: #e74c3c; }
        .modal {
            display: none; position: fixed; top: 0; left: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.6);
            justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; border-radius: 20px; padding: 30px; max-width: 400px; width: 90%; }
        .modal-title { font-size: 20px; font-weight: bold; margin-bottom: 20px; text-align: center; }
        .modal-info { margin: 15px 0; padding: 10px; background: #f8f9fc; border-radius: 10px; }
        .modal-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .modal-buttons > div { flex: 1; padding: 12px; text-align: center; border-radius: 10px; cursor: pointer; }
        .btn-confirm { background: #27ae60; color: white; }
        .btn-cancel { background: #95a5a6; color: white; }
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; border-radius: 8px; color: white; z-index: 1100; display: none;
        }
        .toast.error { background: #e74c3c; }
        .toast.success { background: #27ae60; }
        .toast.info { background: #3498db; }
        footer { text-align: center; padding: 30px; color: rgba(255,255,255,0.6); font-size: 12px; }
        .announcement-bar {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }
        @media (max-width: 768px) {
            .title1 { font-size: 28px; }
            .exchange { flex-direction: column; }
            .title2 span { display: block; margin: 5px 0; }
            .order-item > div { width: 100%; }
        }
    </style>
</head>
<body>

<div class="announcement-bar" id="announcementBar">
    <span id="announcementText"></span>
</div>

<header>
    <div class="headerContet">
        <div class="logo"><span>USDT</span> 兑换系统</div>
        <div class="headerRight"><div id="myOrdersBtn">📋 我的订单</div></div>
    </div>
</header>

<div class="contentBox">
    <div class="title1">USDT 在线兑换</div>
    <div class="title2">
        <span>🔒 匿名隐私</span>
        <span>💎 干净资金</span>
        <span>⚡ 极速兑换</span>
        <span>🕐 24小时服务</span>
    </div>

    <div class="mainBox">
        <div class="mainTitle">💰 当前汇率: 1 USDT = <span id="rate">8.80</span> CNY</div>

        <div class="exchange">
            <div class="inputBox">
                <label>📤 您兑换</label>
                <input type="number" class="input1" id="usdtAmount" placeholder="请输入 USDT 数量" min="10" step="1">
            </div>
            <div class="selectUsdt"><div>💰 USDT</div><div style="font-size:12px;color:#666;">TRC20 网络</div></div>
        </div>

        <div class="calculation">
            <div class="resultBox"><span>📥 您所得</span><span class="result" id="cnyAmount">0.00</span><span>CNY</span></div>
        </div>

        <div class="section-title">🏦 收款方式</div>
        <div class="getMoneyMthod" id="payMethodContainer">
            <div class="card active" data-type="bank">💳 银行卡</div>
            <div class="alipay" data-type="alipay">📱 支付宝</div>
        </div>

        <div class="form-group" id="bankNameGroup">
            <input type="text" id="bankName" placeholder="所属银行（如：中国银行）">
        </div>
        <div class="form-group"><input type="text" id="accountName" placeholder="收款人姓名"></div>
        <div class="form-group"><input type="text" id="accountNumber" placeholder="银行卡号 / 支付宝账号"></div>

        <div class="RedeemNowBtn" id="createOrderBtn">🚀 立即兑换</div>
    </div>

    <div class="orders-section" id="ordersSection" style="display:none;">
        <div class="orders-title">📋 我的订单</div>
        <div class="order-list" id="orderList"><div style="text-align:center;padding:30px;color:#999;">加载中...</div></div>
    </div>
</div>

<footer><div>© 2024 USDT兑换系统 V8.1 | 正规兑换平台 | 24小时自动对账</div></footer>

<div class="modal" id="confirmModal">
    <div class="modal-content">
        <div class="modal-title">📋 确认订单</div>
        <div class="modal-info">
            <div>兑换: <strong id="confirmUsdt">0</strong> USDT</div>
            <div>所得: <strong id="confirmCny">0</strong> CNY</div>
            <div>收款方式: <span id="confirmPayType">银行卡</span></div>
            <div>收款账号: <span id="confirmAccount">-</span></div>
            <div>收款地址: <span id="confirmPaymentAddress" style="font-size:12px;word-break:break-all;">-</span></div>
            <div style="font-size:12px;color:#999;margin-top:10px;">订单号: <span id="confirmOrderNo">-</span></div>
        </div>
        <div class="modal-buttons"><div class="btn-cancel" id="cancelModalBtn">取消</div><div class="btn-confirm" id="confirmPayBtn">确认支付</div></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ✅ Railway 后端地址
    const API_BASE = 'https://usdt-system-production-bee4.up.railway.app';
    
    let currentRate = 8.80;
    let currentUser = localStorage.getItem('userId') || 'user_' + Date.now();
    let pendingOrder = null;
    let ws = null;
    
    if (!localStorage.getItem('userId')) localStorage.setItem('userId', currentUser);
    
    function showToast(msg, type = 'error') {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = `toast ${type}`;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }
    
    async function fetchRate() {
        try {
            const res = await fetch(`${API_BASE}/api/rate`);
            const data = await res.json();
            currentRate = data.rate || 8.8;
            document.getElementById('rate').innerText = currentRate;
            calculate();
        } catch(e) { console.error('获取汇率失败', e); showToast('获取汇率失败', 'error'); }
    }
    
    function calculate() {
        const usdt = parseFloat(document.getElementById('usdtAmount').value) || 0;
        document.getElementById('cnyAmount').innerText = (usdt * currentRate).toFixed(2);
    }
    document.getElementById('usdtAmount').addEventListener('input', calculate);
    
    async function loadPayMethodConfig() {
        try {
            const res = await fetch(`${API_BASE}/api/pay-method-config`);
            const config = await res.json();
            const bankOption = document.querySelector('.card');
            const alipayOption = document.querySelector('.alipay');
            const bankNameGroup = document.getElementById('bankNameGroup');
            if (config.pay_method_config === 'alipay') {
                bankOption.style.display = 'none';
                alipayOption.style.display = 'block';
                alipayOption.classList.add('active');
                bankNameGroup.style.display = 'none';
            } else if (config.pay_method_config === 'bank') {
                bankOption.style.display = 'block';
                alipayOption.style.display = 'none';
                bankOption.classList.add('active');
                bankNameGroup.style.display = 'block';
            } else {
                bankOption.style.display = 'block';
                alipayOption.style.display = 'block';
            }
        } catch(e) { console.error('加载收款方式失败', e); }
    }
    
    async function loadAnnouncements() {
        try {
            const res = await fetch(`${API_BASE}/api/announcements`);
            const announcements = await res.json();
            const bar = document.getElementById('announcementBar');
            const text = document.getElementById('announcementText');
            if (announcements.length === 0) { bar.style.display = 'none'; return; }
            bar.style.display = 'block';
            text.innerHTML = `📢 ${announcements[0].title}：${announcements[0].content}`;
        } catch(e) { console.error('加载公告失败', e); }
    }
    
    document.querySelectorAll('.getMoneyMthod > div').forEach(el => {
        el.addEventListener('click', function() {
            if (this.style.display === 'none') return;
            document.querySelectorAll('.getMoneyMthod > div').forEach(e => e.classList.remove('active'));
            this.classList.add('active');
            const isBank = this.dataset.type === 'bank';
            document.getElementById('bankNameGroup').style.display = isBank ? 'block' : 'none';
            if (!isBank) document.getElementById('bankName').value = '';
        });
    });
    
    async function createOrder() {
        const usdt = parseFloat(document.getElementById('usdtAmount').value);
        const activeMethod = document.querySelector('.getMoneyMthod > div.active');
        if (!activeMethod) return showToast('请选择收款方式');
        const payMethod = activeMethod.dataset.type;
        const bankName = document.getElementById('bankName').value;
        const accountName = document.getElementById('accountName').value;
        const accountNumber = document.getElementById('accountNumber').value;
        
        if (!usdt || usdt < 10) return showToast('兑换数量不能少于 10 USDT');
        if (!accountName) return showToast('请填写收款人姓名');
        if (!accountNumber) return showToast('请填写收款账号');
        if (payMethod === 'bank' && !bankName) return showToast('请填写所属银行');
        
        showToast('正在创建订单...', 'info');
        
        try {
            const res = await fetch(`${API_BASE}/api/order/create`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    userId: currentUser, 
                    amount: usdt, 
                    payType: payMethod, 
                    receiverName: accountName, 
                    accountNumber: accountNumber, 
                    bankName: bankName 
                })
            });
            const data = await res.json();
            console.log('订单创建响应:', data);
            
            if (data.ok) {
                pendingOrder = { 
                    orderNo: data.orderNo, 
                    usdt, 
                    cny: usdt * currentRate, 
                    payType: payMethod === 'bank' ? '银行卡' : '支付宝', 
                    account: accountNumber, 
                    paymentAddress: data.paymentAddress 
                };
                document.getElementById('confirmUsdt').innerText = usdt;
                document.getElementById('confirmCny').innerText = (usdt * currentRate).toFixed(2);
                document.getElementById('confirmPayType').innerText = pendingOrder.payType;
                document.getElementById('confirmAccount').innerText = accountNumber;
                document.getElementById('confirmPaymentAddress').innerText = data.paymentAddress || '请稍后查看';
                document.getElementById('confirmOrderNo').innerText = data.orderNo;
                document.getElementById('confirmModal').style.display = 'flex';
            } else {
                showToast(data.msg || '订单创建失败');
            }
        } catch(e) { 
            console.error('创建订单错误:', e); 
            showToast('网络错误，请稍后重试'); 
        }
    }
    document.getElementById('createOrderBtn').addEventListener('click', createOrder);
    
    function confirmPayment() {
        if (!pendingOrder) return;
        document.getElementById('confirmModal').style.display = 'none';
        showToast(`✅ 订单已创建！请向 ${pendingOrder.paymentAddress} 转账 ${pendingOrder.usdt} USDT`, 'success');
        document.getElementById('usdtAmount').value = '';
        document.getElementById('cnyAmount').innerText = '0.00';
        document.getElementById('bankName').value = '';
        document.getElementById('accountName').value = '';
        document.getElementById('accountNumber').value = '';
        pendingOrder = null;
        setTimeout(() => fetchOrders(), 2000);
    }
    document.getElementById('confirmPayBtn').addEventListener('click', confirmPayment);
    document.getElementById('cancelModalBtn').addEventListener('click', () => { 
        document.getElementById('confirmModal').style.display = 'none'; 
        pendingOrder = null; 
    });
    
    async function fetchOrders() {
        try {
            const res = await fetch(`${API_BASE}/api/orders`);
            const orders = await res.json();
            const container = document.getElementById('orderList');
            const section = document.getElementById('ordersSection');
            if (!orders || orders.length === 0) { 
                container.innerHTML = '<div style="text-align:center;padding:30px;color:#999;">暂无订单记录</div>'; 
                section.style.display = 'block'; 
                return; 
            }
            section.style.display = 'block';
            const statusMap = { 0: '<span class="status-0">⏳ 待支付</span>', 1: '<span class="status-1">💳 已支付</span>', 2: '<span class="status-2">✅ 已完成</span>', 3: '<span class="status-3">❌ 已取消</span>' };
            container.innerHTML = orders.map(o => `<div class="order-item"><div style="font-size:12px;">${o.order_no}</div><div>${o.amount} USDT</div><div>${statusMap[o.status] || '未知'}</div><div style="font-size:12px;color:#999;">${new Date(o.created_at).toLocaleString()}</div></div>`).join('');
        } catch(e) { console.error('获取订单失败', e); }
    }
    document.getElementById('myOrdersBtn').addEventListener('click', () => {
        fetchOrders();
        document.getElementById('ordersSection').scrollIntoView({ behavior: 'smooth' });
    });
    
    function connectWebSocket() {
        try {
            const wsUrl = API_BASE.replace('https://', 'wss://').replace('http://', 'ws://');
            ws = new WebSocket(wsUrl);
            ws.onopen = () => console.log('WebSocket 已连接');
            ws.onmessage = (e) => { 
                const data = JSON.parse(e.data); 
                if (data.type === 'new_order' || data.type === 'settled') { 
                    fetchOrders(); 
                    if (data.type === 'settled') showToast(`✅ 订单 ${data.orderId} 已自动对账完成`, 'success');
                }
                if (data.type === 'rate_update') { 
                    currentRate = data.rate; 
                    document.getElementById('rate').innerText = currentRate; 
                    calculate(); 
                    showToast(`汇率已更新：1 USDT = ${currentRate} CNY`, 'info'); 
                }
                if (data.type === 'new_announcement') loadAnnouncements();
            };
            ws.onerror = (e) => console.error('WebSocket错误', e);
            ws.onclose = () => setTimeout(connectWebSocket, 5000);
        } catch(e) { console.error('WebSocket连接失败', e); }
    }
    
    async function init() {
        await fetchRate();
        calculate();
        await loadPayMethodConfig();
        await loadAnnouncements();
        await fetchOrders();
        connectWebSocket();
    }
    init();
</script>
</body>
</html>
